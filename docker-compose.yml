# =============================================================================
# Docker Compose — Evolution API + n8n (com criação automática de credenciais)
# =============================================================================
#
# O QUE ESTE ARQUIVO FAZ:
#   Sobe um ambiente completo com:
#   - Evolution API  (gerenciamento de instâncias WhatsApp)
#   - Redis          (cache da Evolution API)
#   - PostgreSQL     (banco de dados da Evolution API)
#   - n8n            (automação de fluxos, com credenciais criadas automaticamente)
#
# CREDENCIAIS CRIADAS AUTOMATICAMENTE NO n8n:
#   - "Evolution API" → http://evolution_api:9090 / ApiKey: Test@123123
#   - "Redis"         → host: redis, porta: 6379, sem senha
#
# O QUE DEVE SER ALTERADO ANTES DE USAR:
#   1. POSTGRES_PASSWORD — troque "admin" por uma senha segura
#   2. AUTHENTICATION_API_KEY — troque "Test@123123" por uma chave segura
#   3. N8N_OWNER_EMAIL / N8N_OWNER_PASSWORD — defina as credenciais do admin do n8n
#   4. WEBHOOK_URL e N8N_EDITOR_BASE_URL (se usar domínio)
#
# COMO USAR:
#   1. Coloque o arquivo init-n8n.sh na mesma pasta deste docker-compose.yml
#   2. Suba os containers:
#        docker-compose up -d
#   3. Acesse o n8n em: http://localhost:5678
#   4. Login com: admin@example.com / Admin@123456 (ou o que você definir abaixo)
#   5. As credenciais "Evolution API" e "Redis" já estarão disponíveis!
#
# =============================================================================

services:
  evolution-api:
    container_name: evolution_api
    image: evoapicloud/evolution-api:latest
    restart: always
    depends_on:
      - redis
      - evolution-postgres
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - evolution-net
    environment:
      SERVER_NAME: evolution
      SERVER_TYPE: http
      SERVER_PORT: "9090"
      SERVER_URL: http://localhost:9090
      POSTGRES_DATABASE: evolution_api_db
      POSTGRES_USERNAME: admin
      POSTGRES_PASSWORD: admin # ⚠️ Altere a senha
      CORS_ORIGIN: "*"
      CORS_METHODS: GET,POST,PUT,DELETE
      CORS_CREDENTIALS: "true"
      LOG_LEVEL: ERROR,WARN,DEBUG,INFO,LOG,VERBOSE,DARK,WEBHOOKS,WEBSOCKET
      LOG_COLOR: "true"
      LOG_BAILEYS: error
      EVENT_EMITTER_MAX_LISTENERS: "50"
      DEL_INSTANCE: "false"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://admin:admin@evolution-postgres:5432/evolution_api_db?schema=public
      DATABASE_CONNECTION_CLIENT_NAME: evolution_exchange
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      DATABASE_SAVE_DATA_LABELS: "true"
      DATABASE_SAVE_DATA_HISTORIC: "true"
      DATABASE_SAVE_IS_ON_WHATSAPP: "true"
      DATABASE_SAVE_IS_ON_WHATSAPP_DAYS: "7"
      DATABASE_DELETE_MESSAGE: "true"
      CONFIG_SESSION_PHONE_CLIENT: Evolution API
      CONFIG_SESSION_PHONE_NAME: Chrome
      QRCODE_LIMIT: "30"
      QRCODE_COLOR: "#175197"
      N8N_ENABLED: "true"
      # Redis — sem autenticação
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/6
      CACHE_REDIS_TTL: 604800s
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_SAVE_INSTANCES: "false"
      CACHE_LOCAL_ENABLED: "false"
      # Chave de autenticação da API
      AUTHENTICATION_API_KEY: Test@123123 # ⚠️ Altere a chave
    expose:
      - "9090"

  redis:
    container_name: evolution_redis
    image: redis:latest
    restart: always
    command: >
      redis-server --port 6379 --appendonly yes
    volumes:
      - evolution_redis:/data
    networks:
      - evolution-net
    expose:
      - "6379"

  evolution-postgres:
    container_name: evolution_postgres
    image: postgres:15
    restart: always
    command:
      - postgres
      - -c
      - max_connections=1000
      - -c
      - listen_addresses=*
    environment:
      POSTGRES_DB: evolution_api_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin # ⚠️ Altere a senha (mesma de cima)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - evolution-net
    expose:
      - "5432"

  n8n:
    container_name: n8n
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    depends_on:
      - evolution-api
    environment:
      GENERIC_TIMEZONE: America/Sao_Paulo
      TZ: America/Sao_Paulo
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_RUNNERS_ENABLED: "true"
      #WEBHOOK_URL: https://<seu-dominio>/
      #N8N_EDITOR_BASE_URL: https://<seu-dominio>/
      N8N_HOST: 0.0.0.0
      # ---------- Credenciais do owner do n8n ----------
      N8N_OWNER_EMAIL: admin@example.com        # ⚠️ Altere
      N8N_OWNER_FIRST_NAME: Admin
      N8N_OWNER_LAST_NAME: User
      N8N_OWNER_PASSWORD: "Admin@123456"         # ⚠️ Altere
      # ---------- Dados para criar credenciais ----------
      EVOLUTION_API_URL: http://evolution_api:9090
      EVOLUTION_API_KEY: Test@123123              # Mesma AUTHENTICATION_API_KEY acima
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./init-n8n.sh:/init-n8n.sh:ro
    networks:
      - evolution-net
    entrypoint: ["sh", "/init-n8n.sh"]

volumes:
  evolution_instances:
  evolution_redis:
  postgres_data:
  n8n_data:

networks:
  evolution-net:
    name: evolution-net
    driver: bridge
